<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Garden | Experience Roulette</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-beige: #f7f4ef;
            --paper-white: #ffffff;
            --primary-gold: #c5a880;
            --text-dark: #3a3530;
            --text-light: #7c756e;
            --border-soft: rgba(197, 168, 128, 0.25);
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-beige);
            background-image: 
                radial-gradient(circle at 80% 20%, #f1ece2 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, #ebe4d8 0%, transparent 50%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        .card-frame {
            width: 100%;
            max-width: 480px;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(58, 53, 48, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            text-align: center;
        }

        .card-frame::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--primary-gold);
            margin-bottom: 30px;
        }

        .vault-box { margin-bottom: 30px; }
        .gift-row { display: flex; justify-content: center; gap: 12px; }
        .gift-token {
            font-size: 2.2rem;
            transition: var(--transition-smooth);
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .group-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            display: block;
            text-align: left;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="radio"] { display: none; }

        .tile {
            background: var(--paper-white);
            border: 1px solid rgba(197, 168, 128, 0.2);
            padding: 14px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 68px;
        }

        .tile .emoji { font-size: 1.2rem; margin-bottom: 4px; }
        .tile:hover { border-color: var(--primary-gold); background-color: #faf9f6; }

        input[type="radio"]:checked + .tile {
            border-color: var(--primary-gold);
            background-color: #f6f2ea;
            color: var(--text-dark);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px var(--primary-gold);
        }

        .datetime-picker-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
        }
        .input-block { display: flex; flex-direction: column; }
        .custom-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(197, 168, 128, 0.2);
            background-color: var(--paper-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-dark);
            outline: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .custom-input:focus { border-color: var(--primary-gold); background-color: #f6f2ea; }

        .btn-spin {
            background-color: var(--text-dark);
            color: var(--paper-white);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(58, 53, 48, 0.15);
        }
        .btn-spin:hover { background-color: var(--primary-gold); transform: translateY(-1px); }

        .animation-container {
            display: none;
            margin-top: 30px;
            justify-content: center;
            align-items: center;
            height: 100px;
        }
        .spinning-dice {
            font-size: 3.5rem;
            animation: tumble 0.6s infinite linear;
            color: var(--primary-gold);
        }
        @keyframes tumble {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .reveal-zone {
            margin-top: 35px;
            padding: 25px;
            border-radius: 16px;
            background: #ffffff;
            border: 1px dashed var(--primary-gold);
            display: none;
            text-align: center;
        }
        .reveal-zone.active {
            display: block;
            animation: envelopeReveal 0.6s ease-out forwards;
        }

        .reveal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .reveal-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.6; margin-bottom: 15px; }
        
        .qr-output-box {
            display: inline-block;
            margin: 15px auto;
            padding: 12px;
            background: #ffffff;
            border: 1px solid rgba(197, 168, 128, 0.3);
            border-radius: 12px;
        }

        .btn-whatsapp {
            background-color: var(--text-dark);
            color: var(--paper-white);
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: var(--transition-smooth);
            margin-top: 15px;
            width: 100%;
        }
        .btn-whatsapp:hover { background-color: var(--primary-gold); }
    </style>
</head>
<body>

<div class="card-frame">
    <h1>The Secret Garden</h1>
    <p class="tagline">Curated Moments &amp; Hidden Journeys</p>

    <div class="vault-box">
        <div class="gift-row" id="giftVault">
            <span class="gift-token">🎁</span>
            <span class="gift-token">🎁</span>
            <span class="gift-token">🎁</span>
            <span class="gift-token">🎁</span>
            <span class="gift-token">🎁</span>
        </div>
    </div>

    <span class="group-label">Choose Your Vibe</span>
    <div class="selection-grid">
        <label><input type="radio" name="mood" value="chill" checked><div class="tile"><span class="emoji">🧖‍♀️</span><span>Pure Chill</span></div></label>
        <label><input type="radio" name="adventure"><div class="tile"><span class="emoji">🧗‍♀️</span><span>Adventure</span></div></label>
        <label><input type="radio" name="gourmet"><div class="tile"><span class="emoji">🥂</span><span>Gourmet</span></div></label>
        <label><input type="radio" name="culture"><div class="tile"><span class="emoji">🎻</span><span>Art &amp; Culture</span></div></label>
        <label><input type="radio" name="nature"><div class="tile"><span class="emoji">🌲</span><span>Forest Escape</span></div></label>
        <label><input type="radio" name="cozy"><div class="tile"><span class="emoji">🕯️</span><span>Cozy Magic</span></div></label>
    </div>

    <span class="group-label">The Current Atmosphere</span>
    <div class="selection-grid">
        <label><input type="radio" name="weather" value="sunny" checked><div class="tile"><span class="emoji">☀️</span><span>Sun-Drenched</span></div></label>
        <label><input type="radio" name="weather" value="rainy"><div class="tile"><span class="emoji">🌧️</span><span>Rainy Days</span></div></label>
        <label><input type="radio" name="weather" value="frosty"><div class="tile"><span class="emoji">❄️</span><span>Crisp / Frosty</span></div></label>
    </div>

    <span class="group-label">Your Available Time</span>
    <div class="selection-grid">
        <label><input type="radio" name="duration" value="short" checked><div class="tile"><span>1–3 Hours</span></div></label>
        <label><input type="radio" name="duration" value="medium"><div class="tile"><span>Half / Full Day</span></div></label>
        <label><input type="radio" name="duration" value="long"><div class="tile"><span>1–2 Days</span></div></label>
    </div>

    <div class="datetime-picker-wrap">
        <div class="input-block">
            <span class="group-label">Select Date</span>
            <input type="date" class="custom-input" id="targetDate" required>
        </div>
        <div class="input-block">
            <span class="group-label">Preferred Time</span>
            <input type="time" class="custom-input" id="targetTime" required>
        </div>
    </div>

    <button class="btn-spin" onclick="runAnimatedRoulette()">Unveil Experience ✨</button>

    <div class="animation-container" id="diceStage">
        <div class="spinning-dice">🎲</div>
    </div>

    <div class="reveal-zone" id="revealZone">
        <div id="ticketCaptureArea" style="padding:10px; background:#ffffff; border-radius:8px;">
            <div style="font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--primary-gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px;">Secret Garden Passport</div>
            <div class="reveal-title" id="displayTitle"></div>
            <p class="reveal-desc" id="displayDesc"></p>
            
            <div class="qr-output-box">
                <div id="qrcode"></div>
            </div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-dark); text-transform: uppercase; letter-spacing: 0.5px; margin-top:5px;" id="displayMeta"></div>
        </div>
        
        <button class="btn-whatsapp" onclick="dispatchToAdminAndGroup()">Download Ticket &amp; Open Group Chat 💌</button>
    </div>
</div>

<script>
    let selectedActiveRecord = null;

    const database = [
        // --- ADVENTURE ---
        { title: "Europa-Park Premium Expedition", desc: "Full-day entry passes to Germany's legendary premier theme resort layout in Rust (Baden-Württemberg).", mood: "adventure", weather: "sunny", duration: "long" },
        { title: "Freizeitpark Rutesheim Action Getaway", desc: "Forest climbing courses, outdoor mini-golf, and a traditional warm alpine lodge lunch near Stuttgart.", mood: "adventure", weather: "sunny", duration: "medium" },
        { title: "Munich Eisbachwave Surfing Experience", desc: "A trip to Bavaria's famous rapid river wave with professional gear rentals and hot cocoa.", mood: "adventure", weather: "sunny", duration: "short" },
        { title: "Waldklettergarten Zuffenhausen Ropes", desc: "High canopy ropes adventure course tracking through Stuttgart's deep local woodlands.", mood: "adventure", weather: "sunny", duration: "short" },
        { title: "Stuttgart West Bouldering Challenge", desc: "Private indoor training day passes scaling paths inside the modern urban Vels Arena.", mood: "adventure", weather: "rainy", duration: "short" },
        { title: "Partnach Gorge Deep-Rock Alpine Trek", desc: "Navigate a stunning, narrow mountain gorge in Garmisch-Partenkirchen, Bavaria, with raging waters or frozen winter ice walls.", mood: "adventure", weather: "rainy", duration: "medium" },
        { title: "Rhine Falls Center-Rock Boat Expedition", desc: "Stand next to Europe's most powerful waterfall on the Swiss border, taking a thrilling boat ride directly to the central rock.", mood: "adventure", weather: "sunny", duration: "medium" },
        { title: "Highline179 Suspension Bridge Trek", desc: "Walk across one of the world's longest footbridges suspended 114m over the valleys of Reutte, Austria.", mood: "adventure", weather: "frosty", duration: "short" },

        // --- PURE CHILL ---
        { title: "MineralThermen Bad Cannstatt Soak", desc: "Unwind with deep therapeutic mineral pool thermal sessions inside Stuttgart.", mood: "chill", weather: "rainy", duration: "short" },
        { title: "Bodensee Luxury Spa Day", desc: "Premium panoramic lakeside thermal sauna oasis access down in Überlingen, Baden-Württemberg.", mood: "chill", weather: "frosty", duration: "medium" },
        { title: "Killesberg Steam Train & Artisan Gelato", desc: "A relaxed sunny ride on the valley model railway matched with fresh local waffle cones.", mood: "chill", weather: "sunny", duration: "short" },
        { title: "Stuttgart Vineyards Deluxe Wine Picnic", desc: "Curated Swabian delicacies basket waiting on a scenic vineyard hillside view in Uhlbach.", mood: "chill", weather: "sunny", duration: "medium" },
        { title: "Bregenzerwald Alpine Wellness Retreat", desc: "Cross the Austrian border into Vorarlberg for a pristine natural relaxation loop surrounded by high mountain design.", mood: "chill", weather: "frosty", duration: "long" },
        { title: "Lake Königssee Silent Boat Cruise", desc: "Ride a historic electric boat across the emerald-green, fjord-like waters beneath Bavaria's giant mountains.", mood: "chill", weather: "sunny", duration: "long" },

        // --- GOURMET ---
        { title: "Stuttgart Markthalle Epicurean Food Tour", desc: "Gourmet sampling journey checking out dynamic artisanal standouts in the historic hall.", mood: "gourmet", weather: "rainy", duration: "short" },
        { title: "Rooftop Afternoon High Tea at Graf Zeppelin", desc: "Luxury porcelain tea sets and warm house-baked scones watching the rains clear downtown.", mood: "gourmet", weather: "rainy", duration: "medium" },
        { title: "Munich Dallmayr Coffee House Discovery", desc: "A prestigious culinary espresso and luxury breakfast reservation out in Bavaria.", mood: "gourmet", weather: "sunny", duration: "short" },
        { title: "Traditional Swabian Besenwirtschaft Dinner", desc: "Hearty handmade Maultaschen and local vintage reserve wines at a winemaker's family barn.", mood: "gourmet", weather: "sunny", duration: "medium" },
        { title: "Ritter Sport Lab Crafting Workshop", desc: "Head out to Waldenbuch, Baden-Württemberg to build your own customized chocolate flavors.", mood: "gourmet", weather: "frosty", duration: "short" },
        { title: "Alsace Wine Route Tasting Expedition", desc: "Cross into France to navigate fairytale timbered wine villages like Riquewihr for grand crus and Flammekueche.", mood: "gourmet", weather: "sunny", duration: "long" },

        // --- ART & CULTURE ---
        { title: "Ludwigsburg Baroque Palace Audio Tour", desc: "Explore the striking imperial rooms of Germany's massive pristine residential castle layout.", mood: "culture", weather: "sunny", duration: "medium" },
        { title: "Neuschwanstein Fairytale Castle Expedition", desc: "A historic day trip tracking through Bavaria's iconic mountain palace footprint.", mood: "culture", weather: "sunny", duration: "long" },
        { title: "Stuttgart Staatsgalerie Art & Micro-Roastery", desc: "View legendary canvas collections followed by specialty espresso flights in Stuttgart West.", mood: "culture", weather: "rainy", duration: "short" },
        { title: "Burg Hohenzollern Cloud Fortress Tour", desc: "Historic mountaintop stronghold walk overlooking the sweeping Swabian Alb horizons.", mood: "culture", weather: "frosty", duration: "medium" },
        { title: "Sigmaringen Castle Castle-Rock Tour", desc: "Tour the massive Hohenzollern palace perched dramatically directly over the winding Danube River.", mood: "culture", weather: "rainy", duration: "medium" },
        { title: "Rothenburg ob der Tauber Lantern Walk", desc: "Walk the medieval ramparts of Bavaria's ultimate fairytale town alongside a costumed Night Watchman.", mood: "culture", weather: "frosty", duration: "long" },
        { title: "Strasbourg Petite France Architecture Loop", desc: "Cross the French border to explore 16th-century tanning houses along winding canals.", mood: "culture", weather: "sunny", duration: "long" },
        { title: "Stein am Rhein Medieval Fresco Walk", desc: "Discover a Swiss border town famous for its historic buildings covered in detailed, colorful painted murals.", mood: "culture", weather: "sunny", duration: "medium" },

        // --- FOREST ESCAPE ---
        { title: "Black Forest Wilderness Lake Cabin Stay", desc: "Overnight deep-woods mountain retreat in the Schwarzwald with fireplace log systems.", mood: "nature", weather: "sunny", duration: "long" },
        { title: "Bärensee Lake & Woods Morning Walk", desc: "A crisp morning hike concluding with warm pretzels at the historic Bärenschlössle hunting lodge.", mood: "nature", weather: "sunny", duration: "short" },
        { title: "Schönbuch Protected Woodland Deer Trek", desc: "Forest tracking through natural game reserves packed with premium tracking snack rations.", mood: "nature", weather: "sunny", duration: "medium" },
        { title: "Triberg Cascade & Giant Cuckoo Hikes", desc: "Hike along Germany's highest waterfalls deep inside the Black Forest canopy.", mood: "nature", weather: "rainy", duration: "medium" },

        // --- COZY MAGIC ---
        { title: "Stuttgart Fernsehturm Skyline Sunset Toast", desc: "Take in 360-degree views from the top platform toasted with fine local sparkling wine.", mood: "cozy", weather: "sunny", duration: "short" },
        { title: "Delphi Art-House Candlelit Cinema Pass", desc: "Plush velvet theater layouts, independent cinema viewings, and champagne toast buckets.", mood: "cozy", weather: "rainy", duration: "short" },
        { title: "Eagle’s Nest Panoramic Mountain Summit", desc: "Ascend the high alpine historic outpost in Berchtesgaden, Bavaria, for vertical mountain wall views.", mood: "cozy", weather: "sunny", duration: "long" },
        { title: "Bad Wildbad Suspension Bridge Fog Walk", desc: "Cross the magnificent architectural footbridge hanging high over the misty Black Forest trees.", mood: "cozy", weather: "frosty", duration: "medium" }
    ];

    window.addEventListener('DOMContentLoaded', () => {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('targetDate').min = tomorrow.toISOString().split('T')[0];
    });

    function runAnimatedRoulette() {
        if (!document.getElementById('targetDate').value || !document.getElementById('targetTime').value) {
            alert("Please pick your date and preferred time options first! 🌸");
            return;
        }
        document.getElementById('revealZone').style.display = 'none';
        document.getElementById('diceStage').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('diceStage').style.display = 'none';
            evaluateAndDisplaySurprise();
        }, 1500); 
    }

    function evaluateAndDisplaySurprise() {
        const mood = document.querySelector('input[name="mood"]:checked').value;
        const weather = document.querySelector('input[name="weather"]:checked').value;
        const duration = document.querySelector('input[name="duration"]:checked').value;

        let finalSelections = database.filter(e => e.mood === mood && e.weather === weather && e.duration === duration);
        if (finalSelections.length === 0) finalSelections = database.filter(e => e.mood === mood);

        selectedActiveRecord = finalSelections[Math.floor(Math.random() * finalSelections.length)];

        const randomRefToken = Math.random().toString(36).substring(2, 7).toUpperCase();
        const passportCode = `TSG-${randomRefToken}`;
        const dateString = document.getElementById('targetDate').value;
        const timeString = document.getElementById('targetTime').value;

        document.getElementById('displayTitle').innerText = selectedActiveRecord.title;
        document.getElementById('displayDesc').innerText = selectedActiveRecord.desc;
        
        let allocationDisplay = duration === 'short' ? '1–3 Hours' : duration === 'medium' ? 'Half/Full Day' : '1–2 Days';
        document.getElementById('displayMeta').innerText = `CODE: ${passportCode} | TIMEFRAME: ${allocationDisplay}\nSCHEDULED: ${dateString} @ ${timeString}`;

        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        
        const qrContentText = `REF: ${passportCode}\nEVENT: ${selectedActiveRecord.title}\nDATE: ${dateString}\nTIME: ${timeString}`;
        
        new QRCode(qrContainer, {
            text: qrContentText,
            width: 130,
            height: 130,
            colorDark : "#3a3530",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        const zone = document.getElementById('revealZone');
        zone.style.display = 'block';
        zone.classList.add('active');
        window.scrollTo({ top: zone.offsetTop + 100, behavior: 'smooth' });
    }

    function dispatchToAdminAndGroup() {
        if (!selectedActiveRecord) return;

        const targetNode = document.getElementById('ticketCaptureArea');
        const groupInvitationLink = "https://chat.whatsapp.com/Br544DS1KT1CSYNHDDvVyw";

        html2canvas(targetNode, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
            const imageBlob = canvas.toDataURL("image/png");
            const structuralDownloader = document.createElement('a');
            structuralDownloader.download = `Secret-Garden-Ticket-${selectedActiveRecord.title.replace(/\s+/g, '-')}.png`;
            structuralDownloader.href = imageBlob;
            structuralDownloader.click();
            
            const trackingMetaText = `✨ Unlocked Secret Garden Passport ✨\n\n🌿 EVENT: ${selectedActiveRecord.title}\n📅 DATE: ${document.getElementById('targetDate').value}\n⏰ TIME: ${document.getElementById('targetTime').value}`;
            navigator.clipboard.writeText(trackingMetaText).catch(err => console.log("Clipboard fallback captured."));

            alert("🎟️ Ticket Image Saved & Booking Text Copied!\n\nYour WhatsApp Group chat will now open. Simply attach the downloaded image and hit send! 🌸");

            window.open(groupInvitationLink, '_blank');
        });
    }
</script>
</body>
</html>
