<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Garden | Intelligent Roulette v2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-beige: #f7f4ef;
            --paper-white: #ffffff;
            --primary-gold: #c5a880;
            --text-dark: #3a3530;
            --text-light: #7c756e;
            --border-soft: rgba(197, 168, 128, 0.25);
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            --alert-red: #b35c5c;
            --success-green: #5cb377;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-beige);
            background-image: 
                radial-gradient(circle at 80% 20%, #f1ece2 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, #ebe4d8 0%, transparent 50%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        .card-frame {
            width: 100%;
            max-width: 480px;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(58, 53, 48, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            text-align: center;
        }

        .card-frame::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--primary-gold);
            margin-bottom: 25px;
        }

        .group-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            display: block;
            text-align: left;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Map Utility Box UI */
        .map-trigger-box {
            background: #ffffff;
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }
        .btn-map-generate {
            background: #fdfcf7;
            border: 1px solid var(--primary-gold);
            color: var(--text-dark);
            padding: 8px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition-smooth);
            letter-spacing: 0.5px;
        }
        .btn-map-generate:hover { background: var(--text-dark); color: #ffffff; }
        
        .map-feedback-telemetry {
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-light);
            font-family: monospace;
            background: #fafaf7;
            padding: 8px;
            border-radius: 6px;
            display: none;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="radio"] { display: none; }

        .tile {
            background: var(--paper-white);
            border: 1px solid rgba(197, 168, 128, 0.2);
            padding: 14px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 68px;
        }
        .tile:hover { border-color: var(--primary-gold); background-color: #faf9f6; }
        input[type="radio"]:checked + .tile {
            border-color: var(--primary-gold);
            background-color: #f6f2ea;
            color: var(--text-dark);
            font-weight: 600;
        }

        .datetime-picker-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
        }
        .input-block { display: flex; flex-direction: column; }
        .custom-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(197, 168, 128, 0.2);
            background-color: var(--paper-white);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-spin {
            background-color: var(--text-dark);
            color: var(--paper-white);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(58, 53, 48, 0.15);
        }

        .animation-container {
            display: none;
            margin-top: 30px;
            justify-content: center;
            align-items: center;
            height: 100px;
        }
        .spinning-dice { font-size: 3.5rem; animation: tumble 0.6s infinite linear; }
        @keyframes tumble { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Intelligent Notice Box Modules */
        .live-status-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 12px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .badge-alert { background: rgba(179, 92, 92, 0.1); color: var(--alert-red); }
        .badge-success { background: rgba(92, 179, 119, 0.1); color: var(--success-green); }

        .intelligent-override-box {
            background: #fff5f5;
            border: 1px solid rgba(179, 92, 92, 0.3);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.75rem;
            color: #7a3a3a;
            margin-bottom: 15px;
            line-height: 1.5;
            text-align: left;
            display: none;
        }

        .reveal-zone {
            margin-top: 35px;
            padding: 25px;
            border-radius: 16px;
            background: #ffffff;
            border: 1px dashed var(--primary-gold);
            display: none;
        }

        .reveal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .reveal-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.6; margin-bottom: 15px; }
        
        .qr-output-box {
            display: inline-block;
            margin: 15px auto;
            padding: 12px;
            background: #ffffff;
            border: 1px solid rgba(197, 168, 128, 0.3);
            border-radius: 12px;
        }

        .btn-whatsapp {
            background-color: var(--text-dark);
            color: var(--paper-white);
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card-frame">
    <h1>The Secret Garden</h1>
    <p class="tagline">Intelligent Real-Time Curations</p>

    <div class="map-trigger-box">
        <span class="group-label" style="margin-bottom:6px;">Regional Geographic Coordinates</span>
        <button class="btn-map-generate" onclick="triggerGeographicPinfall()">📍 Drop Surprise Map Coordinates Pin</button>
        <div class="map-feedback-telemetry" id="mapFeedback">Scanning regional grid space...</div>
    </div>

    <span class="group-label">Choose Your Vibe</span>
    <div class="selection-grid">
        <label><input type="radio" name="mood" value="chill" checked><div class="tile">🧖‍♀️ Chill</div></label>
        <label><input type="radio" name="mood" value="adventure"><div class="tile">🧗‍♀️ Action</div></label>
        <label><input type="radio" name="mood" value="gourmet"><div class="tile">🥂 Fine Eat</div></label>
        <label><input type="radio" name="mood" value="culture"><div class="tile">🎻 Culture</div></label>
        <label><input type="radio" name="mood" value="nature"><div class="tile">🌲 Escape</div></label>
        <label><input type="radio" name="mood" value="cozy"><div class="tile">🕯️ Cozy</div></label>
    </div>

    <div class="datetime-picker-wrap">
        <div class="input-block">
            <span class="group-label">Select Date</span>
            <input type="date" class="custom-input" id="targetDate" required>
        </div>
        <div class="input-block">
            <span class="group-label">Preferred Time</span>
            <input type="time" class="custom-input" id="targetTime" required>
        </div>
    </div>

    <button class="btn-spin" onclick="runAnimatedRoulette()">Process Live Request ✨</button>

    <div class="animation-container" id="diceStage">
        <div class="spinning-dice">🎲</div>
    </div>

    <div class="reveal-zone" id="revealZone">
        <div id="ticketCaptureArea" style="padding:10px; background:#ffffff; border-radius:8px;">
            <div id="statusBadge" class="live-status-badge"></div>
            
            <div id="overrideBox" class="intelligent-override-box"></div>

            <div style="font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--primary-gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px;">Secret Garden Ticket</div>
            <div class="reveal-title" id="displayTitle"></div>
            <p class="reveal-desc" id="displayDesc"></p>
            
            <div class="qr-output-box">
                <div id="qrcode"></div>
            </div>
            <div style="font-size: 0.75rem; font-weight: 600; color: var(--text-dark); text-transform: uppercase; letter-spacing: 0.5px; margin-top:5px;" id="displayMeta"></div>
        </div>
        
        <button class="btn-whatsapp" onclick="dispatchToAdminAndGroup()">Download Ticket Passport &amp; Open Group Chat 💌</button>
    </div>
</div>

<script>
    let selectedActiveRecord = null;
    let mapTargetLocationOverride = null;

    // Comprehensive regional dictionary framework mapped out to coordinate perimeters
    const database = [
        { title: "Europa-Park Full-Throttle Pass", desc: "Premium entry passes to Germany's largest ride park in Rust.", region: "Baden-Württemberg", hours: { open: 9, close: 18 }, seasonalShutdown: [11, 12, 1, 2], mood: "adventure" },
        { title: "Partnach Gorge Deep-Valley Trek", desc: "Navigate the deep stone water chasms out inside Garmisch-Partenkirchen.", region: "Bavaria", hours: { open: 8, close: 18 }, seasonalShutdown: [], mood: "adventure" },
        { title: "Munich Eisbachwave Urban River Surf", desc: "Wetsuit gear rental and professional instruction surfing the freezing park river break.", region: "Bavaria", hours: { open: 6, close: 22 }, seasonalShutdown: [], mood: "adventure" },
        { title: "Rhine Falls Roaring Center-Rock Boat Run", desc: "Ferry cruise getting right next to the massive thundering waterfall on the Swiss border.", region: "Switzerland Border", hours: { open: 9, close: 17 }, seasonalShutdown: [12, 1], mood: "adventure" },
        { title: "MineralThermen Bad Cannstatt Thermal Oasis", desc: "Late-night therapeutic mineral pool alignments and panoramic steam saunas in Stuttgart.", region: "Baden-Württemberg", hours: { open: 9, close: 23 }, seasonalShutdown: [], mood: "chill" },
        { title: "Bodensee Luxury Lakeview Spa Resort", desc: "Relaxing high-end panoramic open-air thermal baths along the water edges of Lake Constance.", region: "Baden-Württemberg", hours: { open: 10, close: 22 }, seasonalShutdown: [], mood: "chill" },
        { title: "Stuttgart Vineyard Sunset Valley Picnic", desc: "Private gourmet lunch wicker basket setup along the steep green grape terraces of Uhlbach.", region: "Baden-Württemberg", hours: { open: 11, close: 20 }, seasonalShutdown: [11, 12, 1, 2, 3], mood: "chill" },
        { title: "Stuttgart Markthalle Epicurean Gastronomy Flight", desc: "Fine cheese, caviar, and wine tasting loops around the old architecture marketplace.", region: "Baden-Württemberg", hours: { open: 8, close: 20 }, seasonalShutdown: [], mood: "gourmet" },
        { title: "Strasbourg Petite France Architecture Food Tour", desc: "Cross the French border line for traditional wood-fired Flammekueche and dry local white wines.", region: "France Border", hours: { open: 11, close: 23 }, seasonalShutdown: [], mood: "gourmet" },
        { title: "Neuschwanstein High-Mountain Royal Fortress", desc: "Exclusive interior castle tour crossing valleys deep into the Bavarian Alps.", region: "Bavaria", hours: { open: 9, close: 16 }, seasonalShutdown: [], mood: "culture" },
        { title: "Rothenburg ob der Tauber Medieval Night Watch", desc: "Costumed guide lantern walk pathing across ancient dynamic city wall battlements.", region: "Bavaria", hours: { open: 20, close: 22 }, seasonalShutdown: [], mood: "culture" },
        { title: "Burg Hohenzollern Majestic Mountain Stronghold", desc: "Explore the historic imperial palace footprint floating above the cloud canopy lines.", region: "Baden-Württemberg", hours: { open: 10, close: 17 }, seasonalShutdown: [], mood: "culture" }
    ];

    // Adaptive alternative backstops deployed instantly by logical context reasoning loops
    const safeAlternatives = {
        adventure: { title: "Stuttgart Indoor Cyber-Climbing Arena", desc: "An all-weather, late-night high-tech dynamic bouldering alternative setup inside Stuttgart West." },
        chill: { title: "Stuttgart Private Vault Hot Tub Experience", desc: "A cozy indoor mineral jacuzzi suite available late hours despite seasonal ambient freeze patterns." },
        gourmet: { title: "Graf Zeppelin Vault Private Wine Dinner", desc: "Swapping outdoor markets for an upscale premium vintage multi-course menu underground." },
        culture: { title: "Delphi Candlelit Independent Luxury Cinema", desc: "Plush velvet lounge environments pairing rare indie classic movies with unlimited champagne buckets." }
    };

    window.addEventListener('DOMContentLoaded', () => {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('targetDate').min = tomorrow.toISOString().split('T')[0];
    });

    function triggerGeographicPinfall() {
        // Simulates dynamic spatial map selections across the region
        const latRange = (Math.random() * (49.0 - 47.2) + 47.2).toFixed(4);
        const lonRange = (Math.random() * (11.5 - 7.5) + 7.5).toFixed(4);
        
        const subRegions = ["Baden-Württemberg", "Bavaria", "France Border", "Switzerland Border"];
        mapTargetLocationOverride = subRegions[Math.floor(Math.random() * subRegions.length)];

        const feedback = document.getElementById('mapFeedback');
        feedback.innerHTML = `🛰️ <b>GPS Lock Found:</b> Lat ${latRange}, Lon ${lonRange}<br>🎯 <b>Targeting Region Area:</b> ${mapTargetLocationOverride}`;
        feedback.style.display = 'block';
    }

    function runAnimatedRoulette() {
        if (!document.getElementById('targetDate').value || !document.getElementById('targetTime').value) {
            alert("Please identify date and hour metrics within the calendar fields first! 🌸");
            return;
        }
        document.getElementById('revealZone').style.display = 'none';
        document.getElementById('diceStage').style.display = 'flex';

        setTimeout(() => {
            document.getElementById('diceStage').style.display = 'none';
            evaluateAndDisplaySurprise();
        }, 1500); 
    }

    function evaluateAndDisplaySurprise() {
        const mood = document.querySelector('input[name="mood"]:checked').value;
        const chosenDate = new Date(document.getElementById('targetDate').value);
        const chosenTimeStr = document.getElementById('targetTime').value;
        const chosenHour = parseInt(chosenTimeStr.split(':')[0], 10);
        const chosenMonth = chosenDate.getMonth() + 1; // 1-12 calendar indexes

        // 1. Regional Filter Mapping
        let pool = database;
        if (mapTargetLocationOverride) {
            pool = database.filter(e => e.region === mapTargetLocationOverride);
            // Dynamic fail-safe relaxation loop if geo-mesh returns no item variants
            if (pool.length === 0) pool = database;
        }

        // 2. Vibe matching
        let candidates = pool.filter(e => e.mood === mood);
        if (candidates.length === 0) candidates = database.filter(e => e.mood === mood);

        selectedActiveRecord = candidates[Math.floor(Math.random() * candidates.length)];

        // --- THE INTELLIGENT COMPLIANCE ALGORITHM LOOP ---
        let isOverridden = false;
        let finalTitle = selectedActiveRecord.title;
        let finalDesc = selectedActiveRecord.desc;

        const badge = document.getElementById('statusBadge');
        const overrideBox = document.getElementById('overrideBox');
        overrideBox.style.display = 'none';

        // Evaluate calendar window availability variables
        const seasonalConflict = selectedActiveRecord.seasonalShutdown.includes(chosenMonth);
        const hoursConflict = (chosenHour < selectedActiveRecord.hours.open || chosenHour >= selectedActiveRecord.hours.close);

        if (seasonalConflict || hoursConflict) {
            isOverridden = true;
            let cause = seasonalConflict ? "seasonal winter closing layout" : "late-night timing curfew constraints";
            
            // Fetch smart fallback values
            const alternative = safeAlternatives[mood] || { title: "Secret Garden Premium Lounge Meet", desc: "A tailored surprise setup coordinated manually by the host team to dodge scheduling blocks." };
            
            finalTitle = alternative.title;
            finalDesc = alternative.desc;

            badge.className = "live-status-badge badge-alert";
            badge.innerText = "⚠️ Smart Schedule Conflict Divert";

            overrideBox.innerHTML = `🤖 <b>Intelligent Reasoning Engine Warning:</b> Your chosen target (<i>${selectedActiveRecord.title}</i>) is flagged unavailable due to ${cause} during your target time slot. The system automatically adjusted and deployed an exquisite alternative option.`;
            overrideBox.style.display = 'block';
        } else {
            badge.className = "live-status-badge badge-success";
            badge.innerText = "🟢 Real-Time Schedule Verified & Confirmed Open";
        }

        // Render data out onto final passport card layout elements
        document.getElementById('displayTitle').innerText = finalTitle;
        document.getElementById('displayDesc').innerText = finalDesc;
        
        const randomRefToken = Math.random().toString(36).substring(2, 7).toUpperCase();
        const passportCode = `TSG-${randomRefToken}`;
        document.getElementById('displayMeta').innerText = `PASSPORT REFMETA: ${passportCode}\nTARGET APPOINTMENT: ${document.getElementById('targetDate').value} @ ${chosenTimeStr}`;

        // QR Engine refresh sequence call loops
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        
        const qrContentText = `PASSPORT: ${passportCode}\nEVENT: ${finalTitle}\nDATE: ${document.getElementById('targetDate').value}\nTIME: ${chosenTimeStr}\nSTATUS: ${isOverridden ? 'DIVERTED_PASS' : 'VERIFIED_OPEN'}`;
        
        new QRCode(qrContainer, {
            text: qrContentText,
            width: 130,
            height: 130,
            colorDark : "#3a3530",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        const zone = document.getElementById('revealZone');
        zone.style.display = 'block';
        window.scrollTo({ top: zone.offsetTop + 100, behavior: 'smooth' });
    }

    function dispatchToAdminAndGroup() {
        if (!selectedActiveRecord) return;

        const targetNode = document.getElementById('ticketCaptureArea');
        const groupInvitationLink = "https://chat.whatsapp.com/Br544DS1KT1CSYNHDDvVyw";

        html2canvas(targetNode, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
            const imageBlob = canvas.toDataURL("image/png");
            const structuralDownloader = document.createElement('a');
            structuralDownloader.download = `Smart-Garden-Ticket.png`;
            structuralDownloader.href = imageBlob;
            structuralDownloader.click();
            
            const trackingMetaText = `✨ Intelligent Passport System Voucher ✨\n\n🌿 EXPERIENCE: ${document.getElementById('displayTitle').innerText}\n📅 TARGET SLOT: ${document.getElementById('targetDate').value} @ ${document.getElementById('targetTime').value}`;
            navigator.clipboard.writeText(trackingMetaText).catch(err => console.log("Clipboard bypass handled."));

            alert("🎟️ Digital Ticket File Saved & Message Text Copied!\n\nYour WhatsApp Group portal will launch now. Attach your passport image download from your file bank and send! 🌸");

            window.open(groupInvitationLink, '_blank');
        });
    }
</script>
</body>
</html>
